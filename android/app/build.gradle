plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.danceattix"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17   // 🔥 updated
        targetCompatibility = JavaVersion.VERSION_17   // 🔥 updated
    }

    kotlinOptions {
        jvmTarget = "17"   // 🔥 important
    }

    defaultConfig {
        applicationId = "com.example.danceattix"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }

    // 🔥 VERY IMPORTANT (Fix Stripe Lint Crash)
    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source = "../.."
}
